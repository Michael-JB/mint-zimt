name: Telegram chat ID

on:
  workflow_dispatch:

jobs:
  telegram-chat-id:
    name: Telegram chat ID
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Discover chat ID
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "::notice::Send a message to your bot now, then wait for this step to complete."
          chat_id=$(uv run --quiet .mint-zimt/telegram_chat_id.py)
          echo "## Your Telegram chat ID is: \`${chat_id}\`" >> "$GITHUB_STEP_SUMMARY"
